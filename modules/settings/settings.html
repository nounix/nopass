<div id="settings" class="modal fade" role="dialog" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered" role="document">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Settings</h5>
                <button type="button" class="close fa fa-times" data-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <div class="modal-body">
                    <div class="input-group">
                        <input id="account-settings" type="text" class="form-control" placeholder="Account">
                        <div class="input-group-append">
                            <button id="remove-account" type="button"
                                class="btn btn-outline-secondary fa fa-minus"></button>
                            <button id="add-account" type="button"
                                class="btn btn-outline-secondary fa fa-plus"></button>
                        </div>
                    </div>
                </div>
            </div>
            <div class="modal-footer">
                <table class="table table-dark table-striped">
                    <thead>
                        <tr>
                            <th>Account</th>
                            <th>Version</th>
                            <th>Length</th>
                            <th>Special characters</th>
                        </tr>
                    </thead>
                    <tbody id="accounts">
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
